name: Swift check API breaks

on:
  workflow_dispatch:
  pull_request:
    types: [opened, synchronize]

jobs:
  analyze-api-breakage:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0

    - name: Swift version
      run: swift --version

    - name: Build
      run: swift build

    - name: Analyze API breakage (workaround compile issue on first run)
      continue-on-error: true
      run: swift package diagnose-api-breaking-changes origin/main --targets SwiftMoney

    - name: Analyze API breakage
      run: swift package diagnose-api-breaking-changes origin/main --targets SwiftMoney
