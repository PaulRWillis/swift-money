name: Swift code coverage

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test-code-coverage:
    runs-on: ubuntu-latest
    container:
      image: swift:latest
    timeout-minutes: 60

    steps:
    - uses: actions/checkout@v6

    - name: Install deps
      run: apt-get update -q && apt-get install -y -q curl

    - name: Swift version
      run: swift --version

    - name: Run tests with coverage
      run: swift test --parallel --enable-code-coverage

    - name: Export code coverage
      run: |
        xctest_binary=$(find .build/debug/ -type f -name "*.xctest" | tail -1)
        if [ -f "${xctest_binary}" ]; then
          llvm-cov export -format="lcov" "${xctest_binary}" \
            -instr-profile .build/debug/codecov/default.profdata > info.lcov
        fi

    - name: Upload codecov
      uses: codecov/codecov-action@v5
      with:
        token: ${{ secrets.CODECOV_REPO_TOKEN }}
        files: info.lcov
        fail_ci_if_error: true
