name: Update README benchmarks

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths:
      - 'Sources/**'
      - 'Benchmarks/**'

permissions:
  contents: write

jobs:
  update-benchmarks:
    timeout-minutes: 30
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
      with:
        token: ${{ secrets.BENCHMARK_PAT }}

    - name: Install jemalloc
      run: sudo apt-get install -y libjemalloc-dev

    - name: Resolve dependencies (with retry)
      run: |
        for attempt in 1 2 3; do
          echo "Resolve attempt $attempt"
          if swift package --package-path Benchmarks resolve; then
            echo "Dependencies resolved successfully"
            break
          fi
          echo "Attempt $attempt failed, cleaning and retrying..."
          rm -rf Benchmarks/.build/repositories
          sleep $((attempt * 10))
        done

    - name: Run benchmarks
      run: |
        swift package --package-path Benchmarks --disable-sandbox benchmark run --format markdown --path stdout --no-progress > benchmark_results.md 2>/dev/null || true

    - name: Update README
      run: |
        if [ ! -s benchmark_results.md ]; then
          echo "No benchmark results generated, skipping."
          exit 0
        fi

        python3 - <<'PYEOF'
        import sys

        with open("README.md") as f:
            readme = f.read()

        start_marker = "<!-- BENCHMARK-START -->"
        end_marker = "<!-- BENCHMARK-END -->"

        start_idx = readme.find(start_marker)
        end_idx = readme.find(end_marker)

        if start_idx == -1 or end_idx == -1:
            print("Benchmark markers not found in README.md, skipping.", file=sys.stderr)
            sys.exit(0)

        with open("benchmark_results.md") as f:
            table = f.read()

        new_readme = (
            readme[:start_idx + len(start_marker)]
            + "\n"
            + table
            + "\n"
            + readme[end_idx:]
        )

        with open("README.md", "w") as f:
            f.write(new_readme)
        PYEOF

    - name: Check for changes
      id: changes
      run: |
        if git diff --quiet README.md; then
          echo "changed=false" >> $GITHUB_OUTPUT
        else
          echo "changed=true" >> $GITHUB_OUTPUT
        fi

    - name: Commit and push
      if: steps.changes.outputs.changed == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
        git add README.md
        git commit -m "docs(benchmarks): update benchmark results in README [skip ci]"
        git push
