name: macOS build

on:
  workflow_dispatch:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-macos:
    runs-on: macos-26
    timeout-minutes: 60
    env:
      DEVELOPER_DIR: /Applications/Xcode_26.2.app/Contents/Developer

    steps:
    - uses: actions/checkout@v6

    - name: Swift version
      run: swift --version

    - name: Build
      run: swift build

    - name: Run tests
      run: swift test --parallel

    - name: Run tests (release)
      run: swift test -c release --parallel
